# LocalTaskClaw — Docker Compose (development)
# Build: docker compose build
# Run:   docker compose up -d

networks:
  internal:
    driver: bridge

services:

  # ─── Core Agent + Admin UI ──────────────────────────────────────────────────
  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localtaskclaw-core
    restart: unless-stopped
    networks: [internal]
    env_file: ./secrets/core.env
    environment:
      WORKSPACE: /data/workspace
      DB_PATH: /data/localtaskclaw.db
      API_PORT: "11387"
    volumes:
      - ./data:/data
    ports:
      - "${LTC_PORT:-11387}:11387"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11387/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Telegram Bot ───────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: localtaskclaw-bot
    restart: unless-stopped
    networks: [internal]
    env_file: ./secrets/bot.env
    environment:
      CORE_URL: http://core:11387
    depends_on:
      core:
        condition: service_healthy
